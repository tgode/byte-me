spring:
  application:
    name: byte-hr

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bytehr}
    username: ${DB_USERNAME:bytehr}
    password: ${DB_PASSWORD:bytehr}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-swallow-size: -1

spring.servlet:
  multipart:
    enabled: true
    max-file-size: 50MB
    max-request-size: 100MB

# Ollama configuration
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text:latest}
  chat-model: ${OLLAMA_CHAT_MODEL:qwen3:1.7b}
  timeout-seconds: ${OLLAMA_TIMEOUT:300}
  chat-timeout-seconds: ${OLLAMA_CHAT_TIMEOUT:300}
  embedding-timeout-seconds: ${OLLAMA_EMBEDDING_TIMEOUT:120}
  # Temperature 0.0 = deterministic output — required for strict RAG mode
  chat-temperature: ${OLLAMA_CHAT_TEMPERATURE:0.0}

# SharePoint / Microsoft Graph configuration
sharepoint:
  tenant-id: ${SHAREPOINT_TENANT_ID:}
  client-id: ${SHAREPOINT_CLIENT_ID:}
  client-secret: ${SHAREPOINT_CLIENT_SECRET:}
  site-id: ${SHAREPOINT_SITE_ID:}
  drive-id: ${SHAREPOINT_DRIVE_ID:}
  sync-enabled: ${SHAREPOINT_SYNC_ENABLED:true}
  sync-interval-ms: ${SHAREPOINT_SYNC_INTERVAL_MS:3600000}

# Microsoft Teams Bot configuration
teams:
  app-id: ${TEAMS_APP_ID:}
  app-password: ${TEAMS_APP_PASSWORD:}

# Vector search configuration
vector-search:
  top-k: ${VECTOR_SEARCH_TOP_K:5}
  # Lowered from 0.50 to 0.35 to support multilingual retrieval.
  # nomic-embed-text produces language-specific embeddings; Albanian/Serbian queries
  # score 0.33-0.40 against English documents. With native-language documents
  # in the index, Albanian/Serbian queries score 0.68+ against their own language.
  min-score: ${VECTOR_SEARCH_MIN_SCORE:0.35}
  confidence-threshold: ${VECTOR_SEARCH_CONFIDENCE_THRESHOLD:0.6}

# Document processing configuration
document:
  chunk-size: ${DOCUMENT_CHUNK_SIZE:1000}
  chunk-overlap: ${DOCUMENT_CHUNK_OVERLAP:200}

# ByteHR document source configuration
# type: "local" (default, for hackathon MVP) or "sharepoint" (production)
bytehr:
  source:
    type: ${BYTEHR_SOURCE_TYPE:local}
    local-path: ${BYTEHR_LOCAL_PATH:./sample-data/hr-documents}
    sync-interval-ms: ${BYTEHR_SYNC_INTERVAL_MS:3600000}
  rag:
    # Number of document chunks retrieved per query.
    # Demo default: 3 (faster). Production: 5-10 (more accurate).
    top-k: ${BYTEHR_RAG_TOP_K:3}
    # Max characters of document context sent to the LLM.
    # Demo default: 1500. Production: 3000-6000.
    max-context-chars: ${BYTEHR_RAG_MAX_CONTEXT_CHARS:1500}
    # Strict RAG mode: LLM is instructed to answer ONLY from retrieved context.
    # When true, the model explicitly says it cannot find information if absent.
    # Default: true (recommended — prevents hallucination of contacts, policies).
    strict-mode: ${BYTEHR_RAG_STRICT_MODE:true}

logging:
  level:
    com.bytehr: INFO
    com.bytehr.service.impl.DocumentProcessorServiceImpl: DEBUG
    com.bytehr.service.impl.EmbeddingServiceImpl: DEBUG
    com.bytehr.service.impl.VectorSearchServiceImpl: DEBUG
    com.bytehr.service.impl.HrResponseAgentImpl: DEBUG
    com.bytehr.integration.ollama.OllamaClient: DEBUG
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
